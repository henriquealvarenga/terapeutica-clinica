project:
  type: website
  output-dir: _site
  # Lista explícita do que renderizar (por pasta). Sem isso, o Quarto
  # pegaria também README.md e outros arquivos que não são páginas.
  render:
    - index.qmd
    - como-estudar.qmd
    - apendice.qmd
    - creditos.qmd
    - "aulas/*.qmd"
    - "professores/*.qmd"
    - "casos/*.qmd"

website:
  title: "Terapêutica Clínica - Módulo Saúde Mental"
  description: "Aprendizagem baseada em casos clínicos em psicofarmacologia, para o ciclo clínico de Medicina"
  site-url: "https://henriquealvarenga.com/terapeutica-clinica"
  navbar:
    background: light
    search: true
    left:
      - href: index.qmd
        text: Início
      - text: "Aulas"
        menu:
          - href: aulas/aula1.qmd
            text: "Aula 1 — Benzodiazepínicos"
          - href: aulas/aula2.qmd
            text: "Aula 2 — ISRS"
          - href: aulas/aula3.qmd
            text: "Aula 3 — Medicalização excessiva"
          - text: "---"
          - text: "Aulas extras"
          - href: aulas/extra-bipolar.qmd
            text: "Extra — Transtorno bipolar"
          - href: aulas/extra-antipsicoticos.qmd
            text: "Extra — Antipsicóticos"
      - href: como-estudar.qmd
        text: "Como estudar"
      - href: apendice.qmd
        text: "Apêndice"
      - href: creditos.qmd
        text: "Créditos"
    right:
      - text: "Professores"
        menu:
          - href: professores/professores.qmd
            text: "Área dos professores"
          - href: professores/professores-edicao.qmd
            text: "Como editar o material"
  # 4 sidebars (uma por aula). Servem apenas como ÍNDICE de ordenação
  # para o Quarto gerar os botões Próximo/Anterior no rodapé. O sidebar
  # não é renderizado visualmente porque `page-layout: full` (abaixo)
  # suprime as colunas laterais — nada de CSS por cima.
  sidebar:
    - id: aula1
      style: floating
      contents:
        - aulas/aula1.qmd
        - casos/aula1-caso1-marina.qmd
        - casos/aula1-caso2-antonio.qmd
        - casos/aula1-caso3-julia.qmd
    - id: aula2
      style: floating
      contents:
        - aulas/aula2.qmd
        - casos/aula2-caso1-roberto.qmd
        - casos/aula2-caso2-cleusa.qmd
        - casos/aula2-caso3-pedro.qmd
    - id: aula3
      style: floating
      contents:
        - aulas/aula3.qmd
        - aulas/aula3-teoria1-medicalizacao.qmd
        - aulas/aula3-teoria2-contexto.qmd
        - aulas/aula3-teoria3-evidencias.qmd
        - aulas/aula3-teoria4-desprescrever.qmd
        - aulas/aula3-teoria5-gestacao.qmd
        - casos/aula3-caso1-conceicao-polifarmacia.qmd
        - casos/aula3-caso2-aline-puerperio.qmd
        - casos/aula3-caso3-davi-infancia.qmd
    - id: extra-bipolar
      style: floating
      contents:
        - aulas/extra-bipolar.qmd
        - casos/extra-bipolar-caso1-lucas-mania.qmd
        - casos/extra-bipolar-caso2-lucas-depressao.qmd
        - casos/extra-bipolar-caso3-lucas-manutencao.qmd
    - id: extra-antipsicoticos
      style: floating
      contents:
        - aulas/extra-antipsicoticos.qmd
        - casos/extra-antipsicoticos-caso1-daniel-primeiro.qmd
        - casos/extra-antipsicoticos-caso2-daniel-efeitos.qmd
        - casos/extra-antipsicoticos-caso3-daniel-clozapina.qmd
    - id: edicao
      style: floating
      contents:
        - professores/professores-edicao.qmd
        - professores/edicao-1-conta.qmd
        - professores/edicao-2-editar.qmd
        - professores/edicao-3-pull-request.qmd
        - professores/edicao-4-depois.qmd
        - professores/edicao-conceito-fork.qmd
        - professores/edicao-conceito-pull-request.qmd
        - professores/edicao-glossario.qmd
  page-footer:
    left: "Terapêutica Clínica - Módulo Saúde Mental · UFSJ · Curso de Medicina"
    center: "[Créditos](/creditos.qmd) · [Como citar](/creditos.qmd#citacao-sugerida) · [GitHub](https://github.com/henriquealvarenga/terapeutica-clinica)"
    right: "[CC BY-NC-SA 4.0](https://creativecommons.org/licenses/by-nc-sa/4.0/deed.pt_BR) · Conteúdo educacional, não constitui orientação de prescrição."

format:
  html:
    theme:
      - cosmo
      - theme-editorial.scss
    css: styles.css
    toc: true
    toc-title: "Nesta página"
    toc-depth: 3
    number-sections: false
    code-copy: true
    anchor-sections: true
    smooth-scroll: true
    link-external-newwindow: true
    link-external-icon: true
    fig-cap-location: bottom
    lang: pt-BR
    page-layout: full
    page-navigation: true

execute:
  freeze: auto
