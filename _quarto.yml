project:
  type: website
  output-dir: _site
  # Lista explícita do que renderizar. Sem isso, Quarto pega todo .md
  # do diretório, incluindo GUIA_PRATICO.md e RESUMO_COWORK.md (docs
  # internos do professor, não páginas do site).
  render:
    - index.qmd
    - aula1.qmd
    - aula2.qmd
    - aula3.qmd
    - aula3-teoria1-medicalizacao.qmd
    - aula3-teoria2-evidencias.qmd
    - aula3-teoria3-desprescrever.qmd
    - aula3-teoria4-gestacao.qmd
    - extra-bipolar.qmd
    - extra-antipsicoticos.qmd
    - como-estudar.qmd
    - apendice.qmd
    - creditos.qmd
    - professores.qmd
    - gabarito.qmd
    - "casos/*.qmd"

website:
  title: "Terapêutica Clínica - Módulo Saúde Mental"
  description: "Aprendizagem baseada em casos clínicos em psicofarmacologia, para o ciclo clínico de Medicina"
  site-url: "https://henriquealvarenga.com/terapeutica-clinica"
  navbar:
    background: light
    search: true
    left:
      - href: index.qmd
        text: Início
      - text: "Aulas"
        menu:
          - href: aula1.qmd
            text: "Aula 1 — Benzodiazepínicos"
          - href: aula2.qmd
            text: "Aula 2 — ISRS"
          - href: aula3.qmd
            text: "Aula 3 — Medicalização excessiva"
          - text: "---"
          - text: "Aulas extras"
          - href: extra-bipolar.qmd
            text: "Extra — Transtorno bipolar"
          - href: extra-antipsicoticos.qmd
            text: "Extra — Antipsicóticos"
      - href: como-estudar.qmd
        text: "Como estudar"
      - href: apendice.qmd
        text: "Apêndice"
      - href: creditos.qmd
        text: "Créditos"
    right:
      - href: professores.qmd
        text: "Professores"
  # 4 sidebars (uma por aula). Servem apenas como ÍNDICE de ordenação
  # para o Quarto gerar os botões Próximo/Anterior no rodapé. O sidebar
  # não é renderizado visualmente porque `page-layout: full` (abaixo)
  # suprime as colunas laterais — nada de CSS por cima.
  sidebar:
    - id: aula1
      style: floating
      contents:
        - aula1.qmd
        - casos/aula1-caso1-marina.qmd
        - casos/aula1-caso2-antonio.qmd
        - casos/aula1-caso3-julia.qmd
    - id: aula2
      style: floating
      contents:
        - aula2.qmd
        - casos/aula2-caso1-roberto.qmd
        - casos/aula2-caso2-cleusa.qmd
        - casos/aula2-caso3-pedro.qmd
    - id: aula3
      style: floating
      contents:
        - aula3.qmd
        - aula3-teoria1-medicalizacao.qmd
        - aula3-teoria2-evidencias.qmd
        - aula3-teoria3-desprescrever.qmd
        - aula3-teoria4-gestacao.qmd
        - casos/aula3-caso1-conceicao-polifarmacia.qmd
        - casos/aula3-caso2-aline-puerperio.qmd
        - casos/aula3-caso3-davi-infancia.qmd
    - id: extra-bipolar
      style: floating
      contents:
        - extra-bipolar.qmd
        - casos/extra-bipolar-caso1-lucas-mania.qmd
        - casos/extra-bipolar-caso2-lucas-depressao.qmd
        - casos/extra-bipolar-caso3-lucas-manutencao.qmd
    - id: extra-antipsicoticos
      style: floating
      contents:
        - extra-antipsicoticos.qmd
        - casos/extra-antipsicoticos-caso1-daniel-primeiro.qmd
        - casos/extra-antipsicoticos-caso2-daniel-efeitos.qmd
        - casos/extra-antipsicoticos-caso3-daniel-clozapina.qmd
  page-footer:
    left: "Terapêutica Clínica - Módulo Saúde Mental · UFSJ · Curso de Medicina"
    center: "[Créditos](/creditos.qmd) · [Como citar](/creditos.qmd#citacao-sugerida)"
    right: "Conteúdo educacional — não constitui orientação de prescrição."

format:
  html:
    theme:
      - cosmo
      - theme-editorial.scss
    css: styles.css
    toc: true
    toc-title: "Nesta página"
    toc-depth: 3
    number-sections: false
    code-copy: true
    anchor-sections: true
    smooth-scroll: true
    link-external-newwindow: true
    link-external-icon: true
    fig-cap-location: bottom
    lang: pt-BR
    page-layout: full
    page-navigation: true

execute:
  freeze: auto
