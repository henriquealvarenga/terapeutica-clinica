name: Publish (Quarto → GitHub Pages)

# Renderiza o site Quarto e publica via GitHub Pages usando o fluxo
# moderno baseado em artifact (sem branch gh-pages).
#
# Para funcionar:
#   1. Settings → Pages → Build and deployment → Source: GitHub Actions
#   2. Os secrets/permissions abaixo são suficientes — nada manual.

on:
  push:
    branches: [main]
  workflow_dispatch:

# Permissões mínimas pro deploy-pages funcionar.
permissions:
  contents: read
  pages: write
  id-token: write

# Garante que só um deploy roda por vez; um push novo cancela o anterior.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Render site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          version: pre-release  # use "release" para versão estável

      # Descomente se alguma aula tiver código Python (chunks {python}).
      # - name: Setup Python
      #   uses: actions/setup-python@v5
      #   with:
      #     python-version: "3.12"
      # - name: Install Python deps
      #   run: pip install jupyter matplotlib pandas

      # Descomente se alguma aula tiver código R (chunks {r}).
      # - name: Setup R
      #   uses: r-lib/actions/setup-r@v2
      #   with:
      #     r-version: "release"
      # - name: Setup R deps
      #   uses: r-lib/actions/setup-renv@v2

      - name: Render Quarto
        run: quarto render

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
