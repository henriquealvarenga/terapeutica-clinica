name: Publish (Quarto → GitHub Pages)

# Renderiza o site Quarto e publica via GitHub Pages usando o fluxo
# moderno baseado em artifact (sem branch gh-pages).
#
# Para funcionar:
#   1. Settings → Pages → Build and deployment → Source: GitHub Actions
#   2. Os secrets/permissions abaixo são suficientes — nada manual.

on:
  push:
    branches: [main]
  workflow_dispatch:

# Permissões mínimas pro deploy-pages funcionar.
permissions:
  contents: read
  pages: write
  id-token: write

# Garante que só um deploy roda por vez; um push novo cancela o anterior.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Render site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          version: pre-release  # use "release" para versão estável

      # Descomente se alguma aula tiver código Python (chunks {python}).
      # - name: Setup Python
      #   uses: actions/setup-python@v5
      #   with:
      #     python-version: "3.12"
      # - name: Install Python deps
      #   run: pip install jupyter matplotlib pandas

      # Descomente se alguma aula tiver código R (chunks {r}).
      # - name: Setup R
      #   uses: r-lib/actions/setup-r@v2
      #   with:
      #     r-version: "release"
      # - name: Setup R deps
      #   uses: r-lib/actions/setup-renv@v2

      - name: Render Quarto
        run: quarto render

      # O gabarito é renderizado normalmente, mas NÃO pode vazar:
      # (1) o índice de busca (search.json) guarda o texto de todas as
      #     páginas em texto puro — removemos as entradas do gabarito;
      # (2) a página em si é cifrada com senha (StaticCrypt). Sem estes
      #     dois passos, a senha seria inútil.
      - name: Remover gabarito do índice de busca
        run: |
          python3 - <<'PY'
          import json
          p = "_site/search.json"
          d = json.load(open(p, encoding="utf-8"))
          n = len(d)
          d = [e for e in d if not (
                  str(e.get("href", "")).startswith("gabarito") or
                  str(e.get("objectID", "")).startswith("gabarito"))]
          json.dump(d, open(p, "w", encoding="utf-8"), ensure_ascii=False)
          print(f"search.json: {n} -> {len(d)} entradas (removidas {n-len(d)} do gabarito)")
          PY

      - name: Cifrar o gabarito com senha (StaticCrypt)
        env:
          STATICRYPT_PASSWORD: ${{ secrets.GABARITO_PASSWORD }}
        working-directory: _site
        run: |
          if [ -z "$STATICRYPT_PASSWORD" ]; then
            echo "::error::Secret GABARITO_PASSWORD não definido. Crie em Settings → Secrets and variables → Actions."
            exit 1
          fi
          npx --yes staticrypt@3 gabarito.html --directory . --short
          rm -f .staticrypt.json
          echo "gabarito.html cifrado."

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
